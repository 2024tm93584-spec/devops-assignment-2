apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-green
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      track: green
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: green
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
