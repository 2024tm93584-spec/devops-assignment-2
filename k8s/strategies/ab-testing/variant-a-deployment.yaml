apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-a
  namespace: aceest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: a
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
