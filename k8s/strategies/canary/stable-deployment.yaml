apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  namespace: aceest
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest-fitness
      release: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        release: stable
    spec:
      containers:
        - name: aceest-fitness
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 5000
